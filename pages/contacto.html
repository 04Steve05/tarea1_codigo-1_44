<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto — CinePlus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="../index.html">CinePlus</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="renta.html">Renta</a></li>
          <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5" style="max-width: 640px;">
    <h2 class="mb-1">Contáctanos</h2>
    <p class="text-white mb-4">Envíanos tu consulta y te responderemos a la brevedad.</p>

    <!-- Tarea 11: Formulario con validación jQuery -->
    <form id="form-contacto" novalidate>

      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre completo</label>
        <input type="text" class="form-control" id="nombre" placeholder="Tu nombre">
        <div class="invalid-feedback" id="error-nombre"></div>
      </div>

      <div class="mb-3">
        <label for="correo" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com">
        <div class="invalid-feedback" id="error-correo"></div>
      </div>

      <div class="mb-3">
        <label for="mensaje" class="form-label">
          Mensaje
          <span class="text-white small">(entre 20 y 50 caracteres)</span>
        </label>
        <textarea class="form-control" id="mensaje" rows="3" placeholder="Escribe tu mensaje..."></textarea>
        <div class="invalid-feedback" id="error-mensaje"></div>
        <div class="form-text" id="contador-chars">0 / 50 caracteres</div>
      </div>

      <button type="submit" class="btn btn-danger px-4">Enviar mensaje</button>

    </form>

    <!-- Alerta de éxito -->
    <div id="alerta-exito" class="alert alert-success mt-3 d-none" role="alert">
      ✓ Tu mensaje fue enviado con éxito. ¡Gracias por contactarnos!
    </div>
  </main>

  <!-- Footer fijo -->
  <footer class="site-footer">
    <small>&copy; 2026 CinePlus. Todos los derechos reservados.</small>
  </footer>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* Tarea 11: Validación con jQuery — sin alert(), errores inline */
    $(function () {

      /* Contador de caracteres en el mensaje */
      $('#mensaje').on('input', function () {
        var len = $(this).val().length;
        $('#contador-chars').text(len + ' / 50 caracteres');
      });

      $('#form-contacto').on('submit', function (e) {
        e.preventDefault();
        var valido = true;

        /* Limpiar errores anteriores */
        $('.form-control').removeClass('is-invalid is-valid');

        /* Validar nombre */
        var nombre = $('#nombre').val().trim();
        if (nombre === '') {
          $('#nombre').addClass('is-invalid');
          $('#error-nombre').text('El nombre es obligatorio.');
          valido = false;
        } else {
          $('#nombre').addClass('is-valid');
        }

        /* Validar correo */
        var correo = $('#correo').val().trim();
        var reCorreo = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (correo === '') {
          $('#correo').addClass('is-invalid');
          $('#error-correo').text('El correo electrónico es obligatorio.');
          valido = false;
        } else if (!reCorreo.test(correo)) {
          $('#correo').addClass('is-invalid');
          $('#error-correo').text('Ingresa un correo electrónico válido.');
          valido = false;
        } else {
          $('#correo').addClass('is-valid');
        }

        /* Validar mensaje: 20–50 caracteres */
        var mensaje = $('#mensaje').val().trim();
        if (mensaje === '') {
          $('#mensaje').addClass('is-invalid');
          $('#error-mensaje').text('El mensaje es obligatorio.');
          valido = false;
        } else if (mensaje.length < 20) {
          $('#mensaje').addClass('is-invalid');
          $('#error-mensaje').text('El mensaje debe tener al menos 20 caracteres (tiene ' + mensaje.length + ').');
          valido = false;
        } else if (mensaje.length > 50) {
          $('#mensaje').addClass('is-invalid');
          $('#error-mensaje').text('El mensaje no puede superar los 50 caracteres (tiene ' + mensaje.length + ').');
          valido = false;
        } else {
          $('#mensaje').addClass('is-valid');
        }

        if (valido) {
          /* Mostrar alerta de éxito y reiniciar formulario */
          $('#alerta-exito').removeClass('d-none').hide().fadeIn();
          setTimeout(function () {
            $('#alerta-exito').fadeOut(function () {
              $(this).addClass('d-none');
            });
          }, 4000);
          document.getElementById('form-contacto').reset();
          $('.form-control').removeClass('is-valid');
          $('#contador-chars').text('0 / 50 caracteres');
        }
      });

    });
  </script>
</body>
</html>
